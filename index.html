<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liquid Glass Tetris 5000</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at top, #1b2735 0, #090a0f 60%);
      color: #f5f5f5; transition: background 0.6s ease;
    }
    body.band-1 { background: radial-gradient(circle at top, #1b2735 0, #090a0f 60%); }
    body.band-2 { background: radial-gradient(circle at top, #241b35 0, #0b0714 60%); }
    body.band-3 { background: radial-gradient(circle at top, #351b2b 0, #12060a 60%); }
    body.band-4 { background: radial-gradient(circle at top, #351f1b 0, #120806 60%); }
    body.band-5 { background: radial-gradient(circle at top, #3a261b 0, #130806 60%); }

    .app {
      display: flex; gap: 24px; padding: 24px; border-radius: 24px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
    }
    .panel { display: flex; flex-direction: column; gap: 16px; min-width: 220px; }
    .glass-card {
      padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.08);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
    }
    h1 { font-size: 20px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9; }
    .subtitle { font-size: 12px; opacity: 0.75; margin-top: 4px; }
    .stat-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }
    .stat-value { font-size: 20px; font-weight: 600; }
    .stat-small { font-size: 12px; opacity: 0.8; }
    .btn {
      border: none; border-radius: 999px; padding: 10px 18px; font-size: 13px;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; color: #0b1020;
      background: linear-gradient(135deg, #7cf7ff, #9b8cff);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      width: 100%; text-align: center;
    }
    canvas {
      background: rgba(5,10,25,0.9); border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 20px 40px rgba(0,0,0,0.7);
    }
    .hint { font-size: 11px; opacity: 0.7; line-height: 1.4; }
    .level-bar { height: 10px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; margin-top: 6px; }
    .level-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#7cf7ff,#ff9bf5); transition: width 0.2s ease; }
    .badge-row { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; }
    .badge {
      flex: 1; padding: 6px 8px; border-radius: 999px; font-size: 10px;
      text-transform: uppercase; text-align: center;
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body class="band-1">
  <div class="app">
    <div class="panel">
      <div class="glass-card">
        <h1>Liquid Glass Tetris 5000</h1>
        <p class="subtitle">Offline • 5000 Levels • Glass UI</p>
        <p class="hint" style="margin-top:8px;">
          Controls:<br>
          ← → Move<br>
          ↓ Soft Drop<br>
          ↑ Rotate<br>
          Space Rotate<br>
          P Pause
        </p>
      </div>

      <div class="glass-card">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
        <div class="level-bar"><div class="level-bar-fill" id="levelFill"></div></div>
        <div class="badge-row">
          <div class="badge" id="bandLabel">Band I</div>
          <div class="badge" id="obstacleLabel">Basic</div>
        </div>
      </div>

      <div class="glass-card">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
        <div class="stat-small" id="linesInfo">Lines this level: 0 / 10</div>
      </div>

      <div class="glass-card">
        <div class="stat-label">Best run (local)</div>
        <div class="stat-small" id="bestInfo">Level 1 • Score 0</div>
      </div>

      <div class="glass-card">
        <button class="btn" id="startBtn">Start / Reset</button>
        <p class="hint" id="statusText" style="margin-top:8px;">Press Start to play.</p>
      </div>
    </div>

    <canvas id="board" width="240" height="480"></canvas>
  </div>

  <script>
    const COLS=10, ROWS=20, BLOCK=24;
    const canvas=document.getElementById("board");
    const ctx=canvas.getContext("2d");

    const levelEl=document.getElementById("level");
    const scoreEl=document.getElementById("score");
    const levelFillEl=document.getElementById("levelFill");
    const linesInfoEl=document.getElementById("linesInfo");
    const statusText=document.getElementById("statusText");
    const startBtn=document.getElementById("startBtn");
    const bestInfoEl=document.getElementById("bestInfo");
    const bandLabelEl=document.getElementById("bandLabel");
    const obstacleLabelEl=document.getElementById("obstacleLabel");

    const COLORS={I:"#7cf7ff",J:"#9b8cff",L:"#ffb86c",O:"#ffe66d",S:"#7bed9f",T:"#ff9bf5",Z:"#ff6b81"};
    const SHAPES={
      I:[[1,1,1,1]],
      J:[[1,0,0],[1,1,1]],
      L:[[0,0,1],[1,1,1]],
      O:[[1,1],[1,1]],
      S:[[0,1,1],[1,1,0]],
      T:[[0,1,0],[1,1,1]],
      Z:[[1,1,0],[0,1,1]]
    };

    let board,current,dropCounter=0,lastTime=0;
    let gameOver=false,paused=false;
    let level=1,score=0,linesClearedThisLevel=0;
    let bestLevel=1,bestScore=0;

    function createMatrix(w,h){const m=[];while(h--)m.push(new Array(w).fill(0));return m;}
    function resetBoard(){board=createMatrix(COLS,ROWS);}
    function randomPiece(){
      const t=Object.keys(SHAPES)[(Math.random()*7)|0];
      return {type:t,matrix:SHAPES[t].map(r=>r.slice()),x:(COLS/2|0)-1,y:0};
    }

    function rotate(m,dir){
      for(let y=0;y<m.length;y++)for(let x=0;x<y;x++) [m[x][y],m[y][x]]=[m[y][x],m[x][y]];
      dir>0?m.forEach(r=>r.reverse()):m.reverse();
    }

    function collide(b,p){
      for(let y=0;y<p.matrix.length;y++)
        for(let x=0;x<p.matrix[y].length;x++)
          if(p.matrix[y][x]!==0 && (b[y+p.y]&&b[y+p.y][x+p.x])!==0) return true;
      return false;
    }

    function merge(b,p){
      p.matrix.forEach((r,y)=>r.forEach((v,x)=>{if(v!==0)b[y+p.y][x+p.x]=p.type;}));
    }

    function clearLines(){
      let count=0;
      outer:for(let y=ROWS-1;y>=0;y--){
        for(let x=0;x<COLS;x++) if(board[y][x]===0) continue outer;
        board.splice(y,1); board.unshift(new Array(COLS).fill(0));
        count++; y++;
      }
      if(count>0){
        score+=[0,40,100,300,1200][count]*level;
        linesClearedThisLevel+=count;
        if(linesClearedThisLevel>=10){
          linesClearedThisLevel=0; level=Math.min(level+1,5000);
          applyLevelBand(); applyLevelObstacles();
        }
        updateUI();
      }
    }

    function drawBlock(x,y,t){
      const c=COLORS[t],px=x*BLOCK,py=y*BLOCK;
      const g=ctx.createLinearGradient(px,py,px+BLOCK,py+BLOCK);
      g.addColorStop(0,c); g.addColorStop(1,"#fff");
      ctx.fillStyle=g; ctx.fillRect(px+1,py+1,BLOCK-2,BLOCK-2);
      ctx.strokeStyle="rgba(0,0,0,0.4)";
      ctx.strokeRect(px+1,py+1,BLOCK-2,BLOCK-2);
    }

    function drawBoard(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      board.forEach((r,y)=>r.forEach((v,x)=>{if(v!==0)drawBlock(x,y,v);}));
      if(current) current.matrix.forEach((r,y)=>r.forEach((v,x)=>{if(v!==0)drawBlock(x+current.x,y+current.y,current.type);}));
    }

    function getBand(l){return l<=1000?1:l<=2000?2:l<=3000?3:l<=4000?4:5;}
    function applyLevelBand(){
      const b=getBand(level);
      document.body.className=`band-${b}`;
      bandLabelEl.textContent=`Band ${["I","II","III","IV","V"][b-1]}`;
    }

    function applyLevelObstacles(){
      let rows=0;
      if(level%50===0) rows=2;
      else if(level%25===0) rows=1;

      if(rows>0){
        obstacleLabelEl.textContent="Garbage rows";
        for(let r=0;r<rows;r++){
          const row=new Array(COLS).fill("X");
          for(let i=0;i<3;i++) row[(Math.random()*COLS)|0]=0;
          board.shift(); board.push(row);
        }
      } else obstacleLabelEl.textContent="Basic";
    }

    function updateUI(){
      levelEl.textContent=level;
      scoreEl.textContent=score;
      levelFillEl.style.width=(linesClearedThisLevel/10*100)+"%";
      linesInfoEl.textContent=`Lines this level: ${linesClearedThisLevel} / 10`;
      bestInfoEl.textContent=`Level ${bestLevel} • Score ${bestScore}`;
    }

    function loadBest(){
      const d=localStorage.getItem("tetris5000_best");
      if(d){const o=JSON.parse(d);bestLevel=o.level||1;bestScore=o.score||0;}
    }
    function saveBest(){
      if(level>bestLevel || (level===bestLevel && score>bestScore)){
        bestLevel=level; bestScore=score;
        localStorage.setItem("tetris5000_best",JSON.stringify({level,score}));
      }
    }

    function drop(){
      current.y++;
      if(collide(board,current)){
        current.y--; merge(board,current); clearLines();
        current=randomPiece();
        if(collide(board,current)){
          gameOver=true; saveBest(); updateUI();
          statusText.textContent="Game over. Press Start.";
        }
      }
      dropCounter=0;
    }

    function update(t=0){
      const d=t-lastTime; lastTime=t;
      if(!paused && !gameOver){
        dropCounter+=d;
        const speed=Math.max(60,900-(level-1)*8);
        if(dropCounter>speed) drop();
        drawBoard();
      }
      requestAnimationFrame(update);
    }

    function resetGame(){
      resetBoard(); current=randomPiece();
      dropCounter=0; lastTime=0; gameOver=false; paused=false;
      level=1; score=0; linesClearedThisLevel=0;
      applyLevelBand(); obstacleLabelEl.textContent="Basic";
      updateUI(); statusText.textContent="Game running.";
    }

    // ⭐ ROTATE FEATURE ADDED — NOTHING ELSE CHANGED
    document.addEventListener("keydown", e=>{
      if(!current || gameOver) return;

      // ROTATE (added)
      if(e.code==="Space" || e.code==="ArrowUp"){
        const old=current.matrix.map(r=>r.slice());
        rotate(current.matrix,1);
        if(collide(board,current)) current.matrix=old;
        return;
      }

      // ORIGINAL CONTROLS (unchanged)
      if(e.code==="ArrowLeft"){
        current.x--; if(collide(board,current)) current.x++;
      }
      else if(e.code==="ArrowRight"){
        current.x++; if(collide(board,current)) current.x--;
      }
      else if(e.code==="ArrowDown"){
        drop();
      }
      else if(e.code==="KeyP"){
        paused=!paused;
        statusText.textContent=paused?"Paused.":"Game running.";
      }
    });

    startBtn.addEventListener("click", resetGame);

    loadBest(); resetGame(); update();
  </script>
</body>
</html>
